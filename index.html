<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Studio Tampa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; background:#111; color:#fff; }
    body { overflow-x:hidden; }
    nav {
      position:fixed; top:0; left:0; width:100%; z-index:99; height:64px; background:rgba(12,12,20,0.78);
      display:flex; align-items:center; justify-content:space-between; padding:0 2rem; box-shadow:0 2px 12px rgba(0,0,0,0.10);
    }
    .nav-logo { font-weight:900; font-size:2rem; color:#fff; letter-spacing:2px; text-shadow:0 2px 8px #00b4d8; }
    .nav-menu { font-size:1.15rem; }
    .nav-menu a { color:#eee; margin-left:2rem; text-decoration:none; font-weight:600; transition:.2s; }
    .nav-menu a:hover { color:#00b4d8; }

    .hero {
      width:100vw; height:90vh; position:relative; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(to bottom,rgba(0,0,0,0.68),rgba(0,0,0,0.94)),url('https://i.imgur.com/T4ZGnJr.jpeg') center center/cover no-repeat;
      margin-bottom:2rem;
    }
    .hero-content { z-index:2; text-align:center; }
    .hero-logo { font-size:4rem; font-weight:900; letter-spacing:2px; color:#00b4d8; text-shadow:0 0 20px #00b4d8, 0 4px 22px #000; margin-bottom:1.1rem; }
    .hero-tagline { font-size:1.5rem; color:#fff; font-weight:600; text-shadow:0 2px 8px #222; }

    section.media {
      padding:3rem 0 1rem; max-width:1180px; margin:auto; text-align:center;
    }
    .media-title { font-size:2.2rem; font-weight:800; letter-spacing:1px; color:#00b4d8; margin-bottom:2.5rem; }
    .media-gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:1.5rem; justify-content:center; }
    .media-item { border-radius:14px; background:#161a20; box-shadow:0 6px 22px #0002; overflow:hidden; transition:.2s; }
    .media-item img, .media-item video { width:100%; display:block; }
    .media-item:hover { box-shadow:0 8px 24px #00b4d870; transform:translateY(-3px) scale(1.012); }
    footer { text-align:center; color:#888; font-size:1rem; margin:4rem 0 2rem; }
    @media (max-width:600px) {
      .hero-logo { font-size:2.1rem; }
      nav { padding:0 1rem; }
      .media-title { font-size:1.4rem; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="nav-logo">DST</span>
    <span class="nav-menu">
      <a href="#media">Media</a>
      <a href="#contact">Contact</a>
    </span>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <div class="hero-logo">Developer Studio Tampa</div>
      <div class="hero-tagline">Gear. Content. Results. No filler.</div>
    </div>
  </section>

  <section class="media" id="media">
    <div class="media-title">Featured Media</div>
    <div class="media-gallery">
      <div class="media-item">
        <img src="https://m.media-amazon.com/images/I/61pKggDKm+L._AC_SL1500_.jpg" alt="QuadCast Mic" />
      </div>
      <!-- Add more images or video as needed -->
    </div>
  </section>

  <footer id="contact">
    <p>
      <a href="https://www.instagram.com/thisisfrsh" target="_blank">Instagram</a> &bull;
      <a href="https://www.youtube.com/@ThisIsFRSH" target="_blank">YouTube</a> &bull;
      <a href="mailto:devstudiotampa@gmail.com">Email</a>
    </p>
    <p>&copy; 2025 Developer Studio Tampa</p>
  </footer>
</body>
</html>
