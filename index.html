<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Studio Tampa</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: #e5e5e5;
    }
    header {
      background: url('https://raw.githubusercontent.com/ThisIsFRSH/website-assets/main/tampa-night.jpg') no-repeat center center/cover;
      height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      text-align: center;
    }
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
    }
    header h1, header p {
      position: relative;
      margin: 0;
      z-index: 1;
    }
    header h1 {
      font-size: 2.5rem;
      color: #00b4d8;
    }
    header p {
      font-size: 1.1rem;
      color: #ddd;
      margin-top: 0.5rem;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }
    .product {
      background-color: #1a1a1a;
      border-radius: 8px;
      padding: 1rem;
      transition: transform 0.2s ease;
    }
    .product:hover {
      transform: translateY(-5px);
    }
    .product img {
      width: 100%;
      border-radius: 4px;
    }
    .product h3 {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: #fff;
    }
    .product a {
      display: inline-block;
      margin-top: 0.5rem;
      text-decoration: none;
      color: #00b4d8;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Developer Studio Tampa</h1>
    <p>Budget Tech Gear That Actually Hits</p>
  </header>

  <main class="container" id="product-grid">
    <!-- Products will go here -->
  </main>

  <script>
    const products = [
      {
        title: "HyperX Cloud II Headset",
        img: "https://m.media-amazon.com/images/I/71I0Vg9Gq-L._AC_SL1500_.jpg",
        link: "#"
      },
      {
        title: "Logitech G305 Wireless Mouse",
        img: "https://m.media-amazon.com/images/I/61FzL8D2XkL._AC_SL1500_.jpg",
        link: "#"
      },
      {
        title: "K380 Wireless Keyboard",
        img: "https://m.media-amazon.com/images/I/61cLqgZ9GZL._AC_SL1500_.jpg",
        link: "#"
      },
      {
        title: "1080p Budget Webcam",
        img: "https://m.media-amazon.com/images/I/61MuJSoWunL._AC_SL1500_.jpg",
        link: "#"
      },
      {
        title: "BOYATA Laptop Stand",
        img: "https://m.media-amazon.com/images/I/71rWbGZ7j-L._AC_SL1500_.jpg",
        link: "#"
      }
    ];

    const grid = document.getElementById("product-grid");
    products.forEach(p => {
      const card = document.createElement("div");
      card.className = "product";
      card.innerHTML = `
        <img src="${p.img}" alt="${p.title}" />
        <h3>${p.title}</h3>
        <a href="${p.link}" target="_blank">View on Amazon</a>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
