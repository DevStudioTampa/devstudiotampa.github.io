<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Studio Tampa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
    header {
      width: 100%;
      background: #171923;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      box-shadow: 0 2px 10px #0004;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .logo {
      font-size: 2rem;
      font-weight: 900;
      color: #00b4d8;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00b4d880;
    }
    nav {
      display: flex;
      gap: 2rem;
    }
    nav .dropdown {
      position: relative;
      cursor: pointer;
    }
    nav .dropdown-content {
      display: none;
      position: absolute;
      background: #1a1a23;
      min-width: 180px;
      box-shadow: 0 6px 20px #0005;
      border-radius: 8px;
      overflow: hidden;
      z-index: 1001;
    }
    nav .dropdown:hover .dropdown-content {
      display: block;
    }
    nav a, nav .dropbtn {
      color: #fff;
      text-decoration: none;
      padding: 0.7rem 1.2rem;
      font-weight: 600;
      font-size: 1rem;
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
    }
    nav .dropdown-content a {
      display: block;
      padding: 0.7rem 1.2rem;
      color: #ccc;
      background: none;
      border: none;
      text-align: left;
      font-size: 0.95rem;
    }
    nav .dropdown-content a:hover {
      background: #00b4d8;
      color: #171923;
    }
    .hero {
      width: 100%;
      min-height: 340px;
      background: url('https://i.imgur.com/T4ZGnJr.jpeg') center center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 2rem;
    }
    .hero-overlay {
      background: rgba(14,16,34,0.66);
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      color: #fff;
      text-align: center;
      padding: 4rem 2rem;
    }
    .hero-content h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: #00b4d8;
      margin-bottom: 1rem;
      text-shadow: 0 0 16px #00b4d8aa;
    }
    .hero-content p {
      font-size: 1.2rem;
      color: #f2f2f2;
      max-width: 600px;
      margin: 0 auto;
    }
    .shop-categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.8rem;
      max-width: 1120px;
      margin: 2rem auto 3rem;
      padding: 0 1rem;
    }
    .cat-card {
      background: #181b23;
      color: #00b4d8;
      border-radius: 12px;
      padding: 2.2rem 1rem 1.2rem;
      font-size: 1.18rem;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 4px 16px #00b4d820;
      transition: box-shadow .18s, transform .18s;
      cursor: pointer;
    }
    .cat-card:hover {
      background: #00b4d8;
      color: #171923;
      box-shadow: 0 8px 32px #00b4d8b0;
      transform: scale(1.04) translateY(-4px);
    }
    .featured-products {
      max-width: 1120px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    .featured-products h2 {
      color: #00b4d8;
      font-size: 2rem;
      font-weight: 800;
      text-align: left;
      margin-bottom: 1.4rem;
      letter-spacing: 1px;
    }
    .featured-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }
    .product {
      background: #15161c;
      border-radius: 10px;
      padding: 1.4rem 1rem 1rem;
      text-align: center;
      box-shadow: 0 2px 10px #0002;
    }
    .product img {
      width: 80%;
      max-width: 170px;
      border-radius: 8px;
      margin-bottom: 1rem;
      background: #222;
    }
    .product h3 {
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 0.6rem;
    }
    .product a {
      color: #00b4d8;
      font-weight: 700;
      text-decoration: none;
    }
    footer {
      text-align: center;
      padding: 2.4rem 1rem 1rem;
      background: #191919;
      color: #999;
      font-size: 0.97rem;
      margin-top: 4rem;
    }
    footer a {
      color: #00b4d8;
      text-decoration: none;
      margin: 0 0.5rem;
      font-weight: 600;
    }
    @media (max-width:700px) {
      header { flex-direction: column; padding: 1.2rem 1rem; }
      nav { flex-direction: column; gap: 0.8rem; }
      .hero-content h1 { font-size: 2rem; }
      .shop-categories { grid-template-columns: 1fr; }
      .featured-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Developer Studio</div>
    <nav>
      <div class="dropdown">
        <span class="dropbtn">Departments</span>
        <div class="dropdown-content">
          <a href="#">Computers</a>
          <a href="#">Photography</a>
          <a href="#">Streaming</a>
          <a href="#">Audio</a>
          <a href="#">Networking</a>
        </div>
      </div>
      <div class="dropdown">
        <span class="dropbtn">Consumer</span>
        <div class="dropdown-content">
          <a href="#">Best Tech for Home</a>
          <a href="#">Personal Devices</a>
          <a href="#">Gaming</a>
          <a href="#">Home Office</a>
        </div>
      </div>
      <div class="dropdown">
        <span class="dropbtn">Enterprise</span>
        <div class="dropdown-content">
          <a href="#">Business Laptops</a>
          <a href="#">Office Networking</a>
          <a href="#">Security Solutions</a>
        </div>
      </div>
      <a href="#contact">Contact</a>
    </nav>
  </header>

    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Tech, Gear, Trust</
